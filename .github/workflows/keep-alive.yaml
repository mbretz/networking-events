name: Supabase Keepalive
on:
  schedule:
    - cron: 0 13 * * *
  workflow_dispatch: null
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Edge Function
        env:
          URL: ${{ secrets.SUPABASE_KEEPALIVE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$URL" ]; then
            echo "SUPABASE_KEEPALIVE_URL is not set"
            exit 1
          fi

          echo "Pinging Supabase keepalive..."

          curl -sS -X POST "$URL" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail

          echo "Keepalive successful ✅"
