name: Supabase Keepalive
on:
  schedule:
    - cron: 0 */12 * * *
  workflow_dispatch: null
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Supabase keepalive function
        run: |
          echo "Pinging Supabase keepalive..."
          curl -sS -X POST "${{ secrets.SUPABASE_KEEPALIVE_URL }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail
          echo "Done."
